---
# Fake NetApp admin secret for "password" auth method.
# Name/namespace match the trident storage entry in
# autoshift/values/clustersets/_example.yaml (secretName/secretNamespace).
apiVersion: v1
kind: Secret
metadata:
  name: openshift-secret
  namespace: secrets-namespace
type: Opaque
data:
  # username: fakeuser
  username: ZmFrZXVzZXI=
  # password: fakepassword
  password: ZmFrZXBhc3N3b3Jk
--- 
# Fake Cert for "certs" auth method
apiVersion: v1
kind: Secret
metadata:
  name: backend-tbc-cert
  namespace: secret-namespace
type: Opaque
stringData:
  clientPrivateKey: >-
    <BASE64_OF_k8senv.key>