apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-trident-storage-config
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{- if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{- end }}
  disabled: false
  dependencies:
    - name: policy-trident-orchestrator
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
    - name: policy-trident-machineconfigs
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trident-backend-storage-config
        spec:
          remediationAction: enforce
          severity: high
          object-templates-raw: |

            {{ "{{hub" }} $configs := index (index (fromConfigMap "{{ $.Values.policy_namespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "" | fromYaml) "trident" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} range $storage := $configs.storage {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: trident.netapp.io/v1
                kind: TridentBackendConfig
                metadata:
                  name: "{{ "{{hub" }} $storage.backendName {{ "hub}}" }}"
                  namespace: trident
                spec:
                  version: 1
                  backendName: "{{ "{{hub" }} $storage.backendName {{ "hub}}" }}"
                  storageDriverName: "{{ "{{hub" }} $storage.storageDriverName | default "ontap-san" {{ "hub}}" }}"
                  managementLIF: "{{ "{{hub" }} $storage.svmLif {{ "hub}}" }}"
                  sanType: "{{ "{{hub" }} $storage.sanType | default "nvme" {{ "hub}}" }}"
                {{ "{{hub-" }} if or (eq (($storage).authMethod | default "password") "cert") (eq (($storage).authMethod | default "password") "certs") {{ "hub}}" }}
                  clientCertificate: {{ "{{" }} fromSecret "openshift-config" "api-tls" "tls.crt" {{ "}}" }}
                  trustedCACertificate: {{ "{{" }} fromConfigMap "openshift-config" "user-ca-bundle" "ca-bundle.crt" | base64enc {{ "}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                  credentials:
                    name: "{{ "{{hub" }} $storage.secretName {{ "hub}}" }}"
                {{ "{{hub" }}- if eq $storage.useREST "true" {{ "hub}}" }}
                  useREST: true
                {{ "{{hub" }}- end {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: storage.k8s.io/v1
                kind: StorageClass
                metadata:
                {{ "{{hub" }}- if eq $storage.defaultStorageClass "true" {{ "hub}}" }}
                  annotations:
                    storageclass.kubernetes.io/is-default-class: 'true'
                {{ "{{hub" }}- end {{ "hub}}" }}
                  name: "{{ "{{hub" }} $storage.storageClassName {{ "hub}}" }}"
                provisioner: csi.trident.netapp.io
                parameters:
                  backendType: "{{ "{{hub" }} $storage.storageDriverName | default "ontap-san" {{ "hub}}" }}"
                  storagePools: "{{ "{{hub" }} $storage.backendName {{ "hub}}" }}:.*"
                  fsType: "{{ "{{hub" }} $storage.fsType | default "ext4" {{ "hub}}" }}"
                mountOptions:
                  - discard
                allowVolumeExpansion: true
            {{ "{{hub" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trident-storage-backend-test
          namespace: {{ .Values.policy_namespace }}
        spec:
          remediationAction: inform # will be overridden by remediationAction in parent policy
          severity: high
          object-templates-raw: |
            {{ "{{hub" }} $configs := index (index (fromConfigMap "{{ $.Values.policy_namespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "" | fromYaml) "trident" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} range $storage := $configs.storage {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: trident.netapp.io/v1
                kind: TridentBackendConfig
                metadata:
                  name: "{{ "{{hub" }} $storage.backendName {{ "hub}}" }}"
                  namespace: trident
                status:
                  phase: Bound
            {{ "{{hub" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trident-snapshot-class
        spec:
          remediationAction: enforce
          severity: high
          object-templates-raw: |
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: snapshot.storage.k8s.io/v1
                kind: VolumeSnapshotClass
                metadata:
                  name: trident-csi-snapclass
                  annotations:
                    snapshot.storage.kubernetes.io/is-default-class: "true"
                driver: csi.trident.netapp.io
                deletionPolicy: Delete
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-trident-storage-config
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := .Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := .Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/trident'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-trident-storage-config
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: placement-policy-trident-storage-config
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-trident-storage-config
    apiGroup: policy.open-cluster-management.io
    kind: Policy
