apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-trident-auth-secret
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{- if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{- end }}
  disabled: false
  hubTemplateOptions:
    serviceAccountName: secret-reader
  dependencies:
    - name: policy-trident-operator-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trident-auth-secret
          namespace: {{ .Values.policy_namespace }}
        spec:
          remediationAction: enforce # will be overridden by remediationAction in parent policy
          severity: high
          object-templates-raw: |

            {{ "{{hub-" }} $configs :=  index (index (fromConfigMap "{{ $.Values.policy_namespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "" | fromYaml) "trident" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} range $idx, $storage := ($configs).storage {{ "hub}}" }}
              {{ "{{hub-" }} if or (eq (($storage).authMethod | default "password") "cert") (eq (($storage).authMethod | default "password") "certs") {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: {{ "{{hub"}} $storage.secretName {{ "hub}}" }}
                  namespace: {{ .Values.trident.namespace }}
                type: Opaque
                stringData:
                  clientPrivateKey: {{ "{{" }} fromSecret "openshift-config" "api-tls" "tls.key" {{ "}}" }}
              {{ "{{hub-" }} else if (eq (($storage).authMethod | default "password") "password") {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: {{ "{{hub"}} $storage.secretName {{ "hub}}" }}
                  namespace: {{ .Values.trident.namespace }}
                type: Opaque
                data:
                  username: {{ "{{hub" }} fromSecret $storage.secretNamespace $storage.secretName "username" {{ "hub}}" }}
                  password: {{ "{{hub" }} fromSecret $storage.secretNamespace $storage.secretName "password" {{ "hub}}" }}
              {{ "{{hub-" }} else {{ "hub}}" }}
               {{ "{{hub-" }} fail (printf "Unsupported auth method: \"%s\"; supported values are '(cert|certs)' or 'password'") {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-trident-auth-secret
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := .Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := .Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/trident'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-trident-auth-secret
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: placement-policy-trident-auth-secret
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-trident-auth-secret
    apiGroup: policy.open-cluster-management.io
    kind: Policy
